# Sync F6 photo-wall scene manifest and carousel thumbnails from scene *.webp files.
#
# Automatic: push a new scene-3x4-*.webp or scene-4x3-*.webp → manifest + thumbs update.
# Manual: GitHub → Actions → "Sync F6 photo wall scenes" → Run workflow

name: Sync F6 photo wall scenes

on:
  push:
    branches: [main]
    paths:
      - "assets/features/F6_photoWall/scenes/scene-*.webp"
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit and push updated manifest.json and thumbnails to this branch"
        type: boolean
        default: true
      generate_thumbnails:
        description: "Generate carousel thumbnails (thumbs/*.webp)"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: sync-f6-photo-wall-scenes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install sharp
        if: github.event_name == 'push' || inputs.generate_thumbnails != false
        run: npm install --no-save sharp

      - name: Regenerate scene manifest and thumbnails
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.generate_thumbnails }}" != "false" ]; then
            node scripts/sync-photo-wall-scene-manifest.mjs
          else
            node scripts/sync-photo-wall-scene-manifest.mjs --no-thumbs
          fi

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- \
            'assets/features/F6_photoWall/scenes/manifest.json' \
            'assets/features/F6_photoWall/scenes/thumbs'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No scene manifest or thumbnail changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git status --short -- \
              'assets/features/F6_photoWall/scenes/manifest.json' \
              'assets/features/F6_photoWall/scenes/thumbs'
          fi

      - name: Commit and push
        if: >-
          steps.changes.outputs.changed == 'true' &&
          (github.event_name == 'push' || inputs.commit_changes != false)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/features/F6_photoWall/scenes/manifest.json
          git add assets/features/F6_photoWall/scenes/thumbs 2>/dev/null || true
          git commit -m "chore(F6): sync photo wall scene manifest and thumbnails"
          git push origin "HEAD:${GITHUB_REF_NAME}"
