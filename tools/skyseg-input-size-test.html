<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>skyseg 輸入尺寸測試</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 16px; background: #e8f8f6; color: #073533; }
    h1 { font-size: 1.1rem; }
    button { padding: 12px 16px; border: 0; border-radius: 12px; background: #0abab5; color: #fff; font-weight: 700; }
    pre { background: #fff; padding: 12px; border-radius: 12px; overflow: auto; font-size: 0.85rem; }
    .note { font-size: 0.85rem; color: #5f7776; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>skyseg_fp16 輸入尺寸測試（WASM）</h1>
  <p class="note">首次執行會下載約 88MB 模型，請保持網路連線。此頁測試瀏覽器環境（與 iPhone Safari 相同）。</p>
  <button id="runBtn">開始測試 320 / 640</button>
  <pre id="log">等待測試…</pre>

  <script type="module">
    const ORT_VERSION = "1.22.0";
    const ORT_BASE = `https://cdn.jsdelivr.net/npm/onnxruntime-web@${ORT_VERSION}/dist`;
    const MODEL_URL = "https://huggingface.co/voyagerfromeast/skyseg/resolve/main/skyseg_fp16.onnx";
    const MEAN = [0.485, 0.456, 0.406];
    const STD = [0.229, 0.224, 0.225];
    const logEl = document.getElementById("log");
    const runBtn = document.getElementById("runBtn");

    function log(msg){ logEl.textContent += msg + "\n"; }

    function buildTensor(size, ort){
      const plane = size * size;
      const data = new Float32Array(3 * plane);
      for (let i = 0; i < plane; i++) {
        data[i] = (0.5 - MEAN[0]) / STD[0];
        data[i + plane] = (0.5 - MEAN[1]) / STD[1];
        data[i + plane * 2] = (0.5 - MEAN[2]) / STD[2];
      }
      return new ort.Tensor("float32", data, [1, 3, size, size]);
    }

    async function testSize(session, ort, size, inputName, outputName){
      const t0 = performance.now();
      const result = await session.run({ [inputName]: buildTensor(size, ort) });
      const ms = performance.now() - t0;
      const dims = result[outputName].dims.join(" × ");
      return { ok: true, ms, dims };
    }

    runBtn.addEventListener("click", async () => {
      runBtn.disabled = true;
      logEl.textContent = "";
      try {
        log("載入 ONNX Runtime WASM…");
        const ort = await import(`${ORT_BASE}/ort.bundle.min.mjs`);
        ort.env.wasm.wasmPaths = ORT_BASE + "/";

        log("下載模型…");
        const response = await fetch(MODEL_URL);
        const buffer = await response.arrayBuffer();
        log(`模型大小：${(buffer.byteLength / 1024 / 1024).toFixed(1)} MB`);

        log("建立 session…");
        const session = await ort.InferenceSession.create(buffer, { executionProviders: ["wasm"] });
        const inputName = session.inputNames[0];
        const outputName = session.outputNames[0];
        log(`輸入：${inputName}`);
        log(`輸出：${outputName}\n`);

        const results = {};
        for (const size of [320, 640]) {
          log(`測試 ${size}×${size} …`);
          try {
            const r = await testSize(session, ort, size, inputName, outputName);
            results[size] = r;
            log(`  ✓ 成功 ${r.ms.toFixed(0)} ms，輸出 ${r.dims}`);
          } catch (error) {
            results[size] = { ok: false, error: error.message };
            log(`  ✗ 失敗：${error.message}`);
          }
        }

        log("\n=== 結論 ===");
        if (results[640]?.ok) {
          log(`640 可用，約慢 ${(results[640].ms / results[320].ms).toFixed(2)}×`);
        } else {
          log("640 不可用，模型固定 320×320。");
          log("建議：320 推論 → 中繼放大 → 全圖合成。");
        }
      } catch (error) {
        log("錯誤：" + error.message);
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
