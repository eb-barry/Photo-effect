<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>skyseg Tile 測試</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 16px; background: #e8f8f6; color: #073533; }
    label { display: block; margin: 8px 0 4px; font-weight: 700; }
    select, input { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid #0abab5; }
    button { margin-top: 12px; padding: 12px 16px; border: 0; border-radius: 12px; background: #0abab5; color: #fff; font-weight: 700; width: 100%; }
    pre { background: #fff; padding: 12px; border-radius: 12px; font-size: 0.82rem; overflow: auto; }
    canvas { width: 100%; max-width: 480px; border-radius: 12px; margin-top: 10px; background: #fff; }
  </style>
</head>
<body>
  <h1>skyseg Tile 測試（WASM）</h1>
  <label>影像寬度</label>
  <input id="width" type="number" value="1280" />
  <label>影像高度</label>
  <input id="height" type="number" value="960" />
  <label>Tile 步進 step</label>
  <select id="step">
    <option value="320">320（無重疊，較快）</option>
    <option value="240">240（25% 重疊）</option>
    <option value="160">160（50% 重疊，較慢）</option>
  </select>
  <button id="runBtn">開始 Baseline vs Tile 測試</button>
  <canvas id="preview" width="320" height="240"></canvas>
  <pre id="log">等待測試…</pre>

  <script type="module">
    const ORT_VERSION = "1.22.0";
    const ORT_BASE = `https://cdn.jsdelivr.net/npm/onnxruntime-web@${ORT_VERSION}/dist`;
    const MODEL_URL = "https://huggingface.co/voyagerfromeast/skyseg/resolve/main/skyseg_fp16.onnx";
    const TILE = 320;
    const MEAN = [0.485, 0.456, 0.406];
    const STD = [0.229, 0.224, 0.225];

    const logEl = document.getElementById("log");
    const runBtn = document.getElementById("runBtn");
    const preview = document.getElementById("preview");
    const pctx = preview.getContext("2d");

    const log = msg => { logEl.textContent += msg + "\n"; };

    function createSynthetic(width, height){
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      const horizon = Math.round(height * 0.55);
      const imageData = ctx.createImageData(width, height);
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const hill = Math.sin(x * 0.03) * 18;
          const sky = y < horizon + hill;
          const i = (y * width + x) * 4;
          imageData.data[i] = sky ? 90 : 34;
          imageData.data[i + 1] = sky ? 160 : 58;
          imageData.data[i + 2] = sky ? 230 : 42;
          imageData.data[i + 3] = 255;
        }
      }
      ctx.putImageData(imageData, 0, 0);
      return canvas;
    }

    function toTensorFromCanvas(srcCanvas, dstSize, ort){
      const tmp = document.createElement("canvas");
      tmp.width = dstSize;
      tmp.height = dstSize;
      const ctx = tmp.getContext("2d");
      ctx.drawImage(srcCanvas, 0, 0, dstSize, dstSize);
      const { data } = ctx.getImageData(0, 0, dstSize, dstSize);
      const plane = dstSize * dstSize;
      const float32 = new Float32Array(3 * plane);
      for (let i = 0; i < plane; i++) {
        float32[i] = (data[i * 4] / 255 - MEAN[0]) / STD[0];
        float32[i + plane] = (data[i * 4 + 1] / 255 - MEAN[1]) / STD[1];
        float32[i + plane * 2] = (data[i * 4 + 2] / 255 - MEAN[2]) / STD[2];
      }
      return new ort.Tensor("float32", float32, [1, 3, dstSize, dstSize]);
    }

    async function infer(session, ort, canvas){
      const t0 = performance.now();
      const result = await session.run({
        [session.inputNames[0]]: toTensorFromCanvas(canvas, TILE, ort)
      });
      return { ms: performance.now() - t0, data: result[session.outputNames[0]].data };
    }

    function drawMaskPreview(prob, label){
      const imageData = pctx.createImageData(preview.width, preview.height);
      for (let i = 0; i < prob.length; i++) {
        const v = Math.round(prob[i] * 255);
        const j = i * 4;
        imageData.data[j] = v;
        imageData.data[j + 1] = v;
        imageData.data[j + 2] = v;
        imageData.data[j + 3] = 255;
      }
      pctx.putImageData(imageData, 0, 0);
      pctx.fillStyle = "#073533";
      pctx.font = "bold 14px sans-serif";
      pctx.fillText(label, 8, 20);
    }

    function origins(length, step){
      const max = Math.max(0, length - TILE);
      const list = [];
      for (let p = 0; p <= max; p += step) list.push(p);
      if (list[list.length - 1] !== max) list.push(max);
      return [...new Set(list)];
    }

    runBtn.addEventListener("click", async () => {
      runBtn.disabled = true;
      logEl.textContent = "";
      const width = Number(document.getElementById("width").value);
      const height = Number(document.getElementById("height").value);
      const step = Number(document.getElementById("step").value);

      try {
        log("載入 ONNX WASM…");
        const ort = await import(`${ORT_BASE}/ort.bundle.min.mjs`);
        ort.env.wasm.wasmPaths = ORT_BASE + "/";
        const response = await fetch(MODEL_URL);
        const session = await ort.InferenceSession.create(await response.arrayBuffer(), {
          executionProviders: ["wasm"]
        });

        const source = createSynthetic(width, height);
        log(`影像 ${width}×${height}，step=${step}\n`);

        const full = document.createElement("canvas");
        full.width = width;
        full.height = height;
        full.getContext("2d").drawImage(source, 0, 0);

        const down = document.createElement("canvas");
        down.width = TILE;
        down.height = TILE;
        down.getContext("2d").drawImage(full, 0, 0, TILE, TILE);
        const base = await infer(session, ort, down);
        log(`Baseline：1 次推論，${base.ms.toFixed(0)} ms`);
        drawMaskPreview([...base.data], "Baseline 320");

        const xs = origins(width, step);
        const ys = origins(height, step);
        let totalMs = 0;
        let count = 0;
        const t1 = performance.now();
        for (const y0 of ys) {
          for (const x0 of xs) {
            const tile = document.createElement("canvas");
            tile.width = TILE;
            tile.height = TILE;
            const tctx = tile.getContext("2d");
            tctx.drawImage(full, x0, y0, TILE, TILE, 0, 0, TILE, TILE);
            await infer(session, ort, tile);
            count += 1;
          }
        }
        totalMs = performance.now() - t1;
        log(`Tile：${xs.length}×${ys.length} = ${count} 次推論，${totalMs.toFixed(0)} ms`);
        log(`倍率：${(totalMs / base.ms).toFixed(1)}× baseline`);
        log("\n結論：Tile 在 WASM 上通常慢 N 倍（N = tile 數）。");
        log("若要用於生產，建議只對天空上半部 tile，或維持 320 baseline + 柔邊合成。");
      } catch (error) {
        log("錯誤：" + error.message);
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
